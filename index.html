<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#ffffff;
}

.container{
padding:10px;
}

h2{
margin:0 0 10px 0;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f3f3f3;
font-weight:bold;
}

.position{
font-weight:bold;
width:30px;
}

.points{
font-weight:bold;
}

.promo{
background:#e8f5e9;
}

.relegation{
background:#ffebee;
}

</style>
</head>


<body>

<div class="container">

<h2>Regionalliga West</h2>

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>P</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>

</div>

<script>

fetch("table.json")
.then(response => response.json())
.then(data => {

const tbody = document.getElementById("table-body");

data.forEach(team => {

let rowClass = "";

if(team.position == 1){
rowClass = "promo";
}

if(team.position >= 17){
rowClass = "relegation";
}

const row = `
<tr class="${rowClass}">
<td class="position">${team.position}</td>
<td>${team.team}</td>
<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td class="points">${team.points}</td>
</tr>
`;

tbody.innerHTML += row;

});

})
.catch(error => {
console.error("Fehler beim Laden der Tabelle:", error);
});

</script>

</body>
</html>
