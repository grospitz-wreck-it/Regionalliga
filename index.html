<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  margin:0;
}

.widget{
  width:100%;
  max-width:720px;
}

.header{
  font-weight:700;
  font-size:18px;
  color:#c40000;
  margin-bottom:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

thead th{
  text-align:left;
  padding:8px 6px;
  border-bottom:2px solid #e5e5e5;
  color:#666;
}

tbody td{
  padding:8px 6px;
  border-bottom:1px solid #eee;
}

tbody tr:hover{
  background:#fafafa;
}

.rank{
  width:30px;
  color:#888;
}

.team{
  display:flex;
  align-items:center;
  gap:8px;
}

.team img{
  width:18px;
  height:18px;
  object-fit:contain;
}

.points{
  font-weight:bold;
}

</style>
</head>

<body>

<div class="widget">

<div class="header">
Regionalliga West – Tabelle
</div>

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>Pkt</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

fetch("table.json")
.then(res => res.json())
.then(data => {

const tbody = document.getElementById("table");

data.forEach(team => {

const tr = document.createElement("tr");

tr.innerHTML = `
<td class="rank">${team.position}</td>

<td class="team">
<img src="${team.logo}" loading="lazy">
${team.team}
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td class="points">${team.points}</td>
`;

tbody.appendChild(tr);

});

resizeIframe();

});

function resizeIframe(){

const height = document.body.scrollHeight;

if(window.parent){
window.parent.postMessage(height,"*");
}

}

</script>

</body>
</html>
