<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Regionalliga West Tabelle</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#ffffff;
color:#333;
}

.table-wrapper{
max-width:720px;
margin:auto;
}

/* Tabelle */

.rl-table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

/* Header */

.rl-table thead{
background:#e3000f;
color:white;
}

.rl-table th{
padding:9px 6px;
text-align:left;
font-weight:600;
font-size:13px;
}

/* Zellen */

.rl-table td{
padding:8px 6px;
font-size:13px;
}

/* Linien */

.rl-table tbody tr{
border-bottom:1px solid #e6e6e6;
}

/* Zebra */

.rl-table tbody tr:nth-child(even){
background:#f5f5f5;
}

/* Hover */

.rl-table tbody tr:hover{
background:#f0f0f0;
transition:background .15s ease;
}

/* Position */

.rl-table td:first-child{
width:34px;
text-align:center;
color:#666;
}

/* Team */

.team{
display:flex;
align-items:center;
gap:8px;
font-weight:500;
}

.team img{
width:18px;
height:18px;
object-fit:contain;
}

/* OWL Pin */

.owl-pin{
width:12px;
height:12px;
margin-left:6px;
display:inline-block;
}

.owl-pin svg{
width:100%;
height:100%;
fill:#e3000f;
}

/* Aufsteiger */

.promoted{
border-left:4px solid #2e7d32;
background:#eef7ef;
}

/* Absteiger */

.relegated{
border-left:4px solid #e3000f;
background:#fdeeee;
}

/* Punkte */

.rl-table td:last-child{
font-weight:700;
}

/* Quelle */

.source{
font-size:10px;
color:#888;
margin-top:6px;
text-align:right;
}

</style>
</head>

<body>

<div class="table-wrapper">

<table class="rl-table">

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>Pkt</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>

<div class="source">
Quelle: transfermarkt.de
</div>

</div>

<script>

fetch("table.json")
.then(r=>r.json())
.then(data=>renderTable(data))

function renderTable(data){

const body = document.getElementById("table-body")

const owlClubs = [
"SV Rödinghausen",
"FC Gütersloh",
"SC Paderborn II",
"SF Lotte"
]

const owlPin = `
<span class="owl-pin" title="OWL-Team">
<svg viewBox="0 0 24 24">
<path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/>
</svg>
</span>
`

data.forEach((team,i)=>{

let rowClass=""

if(i===0) rowClass="promoted"
if(i>=15) rowClass="relegated"

const owl = owlClubs.includes(team.team) ? owlPin : ""

const logo = `logos/${team.team}.png`

body.innerHTML += `
<tr class="${rowClass}">
<td>${i+1}</td>
<td>
<div class="team">
<img src="${logo}" alt="">
${team.team}
${owl}
</div>
</td>
<td>${team.sp}</td>
<td>${team.s}</td>
<td>${team.u}</td>
<td>${team.n}</td>
<td>${team.t}</td>
<td>${team.p}</td>
</tr>
`
})

}

</script>

</body>
</html>
