<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

.wrapper{
max-width:800px;
margin:auto;
background:white;
padding:20px;
}

h2{
margin-top:0;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#222;
color:white;
}

tr:hover{
background:#f8f8f8;
}

.team{
display:flex;
align-items:center;
gap:8px;
}

.logo{
width:22px;
height:22px;
}

.promote{
background:#e7f6e7;
}

.relegate{
background:#fdeaea;
}

.points{
font-weight:bold;
}

@media(max-width:600px){

th:nth-child(4),
th:nth-child(5),
th:nth-child(6),
td:nth-child(4),
td:nth-child(5),
td:nth-child(6){
display:none;
}

}

</style>
</head>

<body>

<div class="wrapper">

<h2>Regionalliga West</h2>

<table id="table">

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>P</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const logos={

"MSV Duisburg":"https://upload.wikimedia.org/wikipedia/en/7/7c/MSV_Duisburg_logo.svg",
"Rot-Weiß Oberhausen":"https://upload.wikimedia.org/wikipedia/en/6/6b/Rot-Weiss_Oberhausen_logo.svg",
"Fortuna Köln":"https://upload.wikimedia.org/wikipedia/en/5/5b/SC_Fortuna_Koeln_logo.svg",
"Sportfreunde Lotte":"https://upload.wikimedia.org/wikipedia/en/4/49/Sportfreunde_Lotte_logo.svg",
"SV Rödinghausen":"https://upload.wikimedia.org/wikipedia/en/b/bc/SV_Roedinghausen_logo.svg",
"Wuppertaler SV":"https://upload.wikimedia.org/wikipedia/en/6/63/Wuppertaler_SV_logo.svg",
"1. FC Bocholt":"https://upload.wikimedia.org/wikipedia/en/6/64/1._FC_Bocholt_logo.svg",
"SC Wiedenbrück":"https://upload.wikimedia.org/wikipedia/en/0/0f/SC_Wiedenbrueck_logo.svg",
"Fortuna Düsseldorf II":"https://upload.wikimedia.org/wikipedia/en/8/8a/Fortuna_Duesseldorf_logo.svg",
"1. FC Köln II":"https://upload.wikimedia.org/wikipedia/en/5/5f/1._FC_Koeln_logo.svg",
"Borussia Mönchengladbach II":"https://upload.wikimedia.org/wikipedia/en/8/81/Borussia_Monchengladbach_logo.svg",
"SC Paderborn II":"https://upload.wikimedia.org/wikipedia/en/7/7e/SC_Paderborn_07_logo.svg"

};

fetch("table.json")
.then(res=>res.json())
.then(data=>{

const tbody=document.querySelector("#table tbody");

data.forEach(team=>{

let tr=document.createElement("tr");

if(team.position===1){
tr.classList.add("promote");
}

if(team.position>=16){
tr.classList.add("relegate");
}

let logo=logos[team.team]||"";

tr.innerHTML=`

<td>${team.position}</td>

<td class="team">
<img class="logo" src="${logo}">
${team.team}
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td class="points">${team.points}</td>

`;

tbody.appendChild(tr);

});

});

</script>

</body>
</html>
