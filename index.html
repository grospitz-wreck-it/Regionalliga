<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  margin:0;
  background:transparent;
}

.widget{
  width:100%;
  max-width:720px;
}

.header{
  font-weight:700;
  font-size:18px;
  color:#c40000;
  margin-bottom:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

thead th{
  text-align:left;
  padding:8px 6px;
  border-bottom:2px solid #e5e5e5;
  color:#666;
  font-weight:600;
}

tbody td{
  padding:8px 6px;
  border-bottom:1px solid #eee;
}

tbody tr:hover{
  background:#fafafa;
}

.rank{
  width:28px;
  color:#888;
}

.team{
  display:flex;
  align-items:center;
  gap:8px;
}

.team img{
  width:18px;
  height:18px;
  object-fit:contain;
}

.points{
  font-weight:700;
}

</style>
</head>

<body>

<div class="widget">

<div class="header">
Regionalliga West – Tabelle
</div>

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>Pkt</th>
</tr>
</thead>

<tbody id="tablebody"></tbody>

</table>

</div>

<script>

fetch("table.json")
.then(r => r.json())
.then(data => {

const tbody = document.getElementById("tablebody");

data.forEach((team,index)=>{

const row=document.createElement("tr");

const games = team.sp || team.games || "";
const wins = team.s || team.wins || "";
const draws = team.u || team.draws || "";
const losses = team.n || team.losses || "";
const goals = team.tore || team.goals || "";
const points = team.pkt || team.points || "";

row.innerHTML = `

<td class="rank">${index+1}</td>

<td class="team">
<img src="${team.logo || ""}" loading="lazy">
${team.team || team.name}
</td>

<td>${games}</td>
<td>${wins}</td>
<td>${draws}</td>
<td>${losses}</td>
<td>${goals}</td>
<td class="points">${points}</td>

`;

tbody.appendChild(row);

});

resizeIframe();

});

function resizeIframe(){

const height=document.body.scrollHeight;

if(window.parent){
window.parent.postMessage(height,"*");
}

}

</script>

</body>
</html>
