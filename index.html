<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f2f2f2;
}

.container{
max-width:850px;
margin:auto;
background:white;
padding:20px;
}

h2{
margin-top:0;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:left;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#222;
color:white;
}

tr:hover{
background:#f8f8f8;
}

.team{
display:flex;
align-items:center;
gap:8px;
}

.logo{
width:22px;
height:22px;
object-fit:contain;
}

.points{
font-weight:bold;
}

.promote{
background:#e6f6e6;
}

.relegate{
background:#fdeaea;
}

@media(max-width:600px){

th:nth-child(4),
th:nth-child(5),
th:nth-child(6),
td:nth-child(4),
td:nth-child(5),
td:nth-child(6){
display:none;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Regionalliga West Tabelle</h2>

<table id="table">

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>P</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

function getLogo(team){

const logos={

"MSV Duisburg":"msv-duisburg",
"Rot-Weiß Oberhausen":"rot-weiss-oberhausen",
"Fortuna Köln":"fortuna-koeln",
"Wuppertaler SV":"wuppertaler-sv",
"SV Rödinghausen":"sv-roedinghausen",
"Sportfreunde Lotte":"sportfreunde-lotte",
"1. FC Bocholt":"1-fc-bocholt",
"SC Wiedenbrück":"sc-wiedenbrueck",
"Fortuna Düsseldorf II":"fortuna-duesseldorf-ii",
"1. FC Köln II":"1-fc-koeln-ii",
"Borussia Mönchengladbach II":"borussia-moenchengladbach-ii",
"SC Paderborn II":"sc-paderborn-ii",
"Alemannia Aachen":"alemannia-aachen",
"Schalke 04 II":"schalke-04-ii",
"Preußen Münster II":"preussen-muenster-ii",
"KFC Uerdingen":"kfc-uerdingen",
"FC Gütersloh":"fc-guetersloh"

};

if(logos[team]){
return "https://assets.kicker.de/team/logos/" + logos[team] + ".png";
}

return "";

}

fetch("table.json")
.then(res=>res.json())
.then(data=>{

const tbody=document.querySelector("#table tbody");

data.forEach(team=>{

const tr=document.createElement("tr");

if(team.position===1){
tr.classList.add("promote");
}

if(team.position>=16){
tr.classList.add("relegate");
}

const logo=getLogo(team.team);

tr.innerHTML=`

<td>${team.position}</td>

<td>
<div class="team">
<img class="logo" src="${logo}" onerror="this.style.display='none'">
<span>${team.team}</span>
</div>
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td class="points">${team.points}</td>

`;

tbody.appendChild(tr);

});

});

</script>

</body>
</html>
