<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
font-family:Arial;
background:#f4f6fa;
padding:40px;
}

h1{
text-align:center;
}

table{
width:100%;
max-width:900px;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

th{
background:#1e293b;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.team{
display:flex;
align-items:center;
gap:10px;
text-align:left;
}

.team img{
width:26px;
height:26px;
}

tr:nth-child(1){
background:#d1fae5;
}

tr:nth-child(16),
tr:nth-child(17),
tr:nth-child(18){
background:#fee2e2;
}

</style>

</head>

<body>

<h1>Regionalliga West Tabelle</h1>

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>Pkt</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

fetch("table.json")
.then(r=>r.json())
.then(data=>{

const tbody=document.getElementById("table");

data.forEach(team=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${team.position}</td>

<td class="team">
<img src="${team.logo}">
${team.team}
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td><b>${team.points}</b></td>

`;

tbody.appendChild(tr);

});

});

</script>

</body>
</html>
