<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
padding:30px;
}

table{
width:900px;
margin:auto;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th{
background:#020617;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #334155;
text-align:center;
}

.team{
display:flex;
align-items:center;
gap:10px;
}

.team img{
width:28px;
}

</style>

</head>

<body>

<h1 style="text-align:center">Regionalliga West</h1>

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>Pkt</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

fetch("table.json")
.then(r=>r.json())
.then(data=>{

const tbody=document.getElementById("table");

data.forEach(team=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${team.position}</td>

<td class="team">
<img src="${team.logo}">
${team.team}
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td><b>${team.points}</b></td>

`;

tbody.appendChild(tr);

});

});

</script>

</body>
</html>
