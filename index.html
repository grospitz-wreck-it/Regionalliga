<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#ffffff;
}

.table-container{
padding:10px;
}

h2{
margin:0 0 10px 0;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f3f3f3;
font-weight:bold;
}

.position{
font-weight:bold;
width:30px;
}

.points{
font-weight:bold;
}

.promo{
background:#e8f5e9;
}

.relegation{
background:#ffebee;
}

.team{
display:flex;
align-items:center;
gap:6px;
}

.logo{
width:18px;
height:18px;
}

</style>
</head>

<body>

<div class="table-container">

<h2>Regionalliga West</h2>

<table>

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>Tore</th>
<th>P</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>

</div>

<script>

const data = [
{position:1,team:"Alemannia Aachen",games:30,goals:"58:29",points:65},
{position:2,team:"Rot-Weiß Oberhausen",games:30,goals:"60:32",points:63},
{position:3,team:"Wuppertaler SV",games:30,goals:"54:33",points:58},
{position:4,team:"Fortuna Köln",games:30,goals:"52:35",points:55},
{position:5,team:"Rot Weiss Ahlen",games:30,goals:"48:38",points:50},
{position:6,team:"1. FC Bocholt",games:30,goals:"47:40",points:48},
{position:7,team:"Schalke 04 II",games:30,goals:"45:41",points:47},
{position:8,team:"SC Wiedenbrück",games:30,goals:"43:39",points:45},
{position:9,team:"SV Rödinghausen",games:30,goals:"42:40",points:44},
{position:10,team:"Fortuna Düsseldorf II",games:30,goals:"40:42",points:42}
];

const tbody = document.getElementById("table-body");

data.forEach(team => {

let className = "";

if(team.position === 1) className = "promo";
if(team.position >= 17) className = "relegation";

const row = `
<tr class="${className}">
<td class="position">${team.position}</td>
<td class="team">${team.team}</td>
<td>${team.games}</td>
<td>${team.goals}</td>
<td class="points">${team.points}</td>
</tr>
`;

tbody.innerHTML += row;

});

</script>

</body>
</html>
