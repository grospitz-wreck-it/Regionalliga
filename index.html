<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
}

h2{
margin-top:0;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#222;
color:white;
}

.team{
display:flex;
align-items:center;
gap:8px;
}

.logo{
width:22px;
height:22px;
object-fit:contain;
}

.promote{
background:#e7f6e7;
}

.relegate{
background:#fdeaea;
}

.points{
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Regionalliga West</h2>

<table id="table">

<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>P</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

async function getLogo(team){

try{

const search=team+" logo";

const url=`https://commons.wikimedia.org/w/api.php?action=query&origin=*&generator=search&gsrsearch=${encodeURIComponent(search)}&gsrlimit=1&prop=imageinfo&iiprop=url&format=json`;

const res=await fetch(url);

const data=await res.json();

const pages=data.query.pages;

const page=Object.values(pages)[0];

return page.imageinfo[0].url;

}catch{

return "";

}

}

async function loadTable(){

const res=await fetch("table.json");

const data=await res.json();

const tbody=document.querySelector("#table tbody");

for(const team of data){

const tr=document.createElement("tr");

if(team.position===1){
tr.classList.add("promote");
}

if(team.position>=16){
tr.classList.add("relegate");
}

const logo=await getLogo(team.team);

tr.innerHTML=`

<td>${team.position}</td>

<td>
<div class="team">
<img class="logo" src="${logo}">
<span>${team.team}</span>
</div>
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td class="points">${team.points}</td>

`;

tbody.appendChild(tr);

}

}

loadTable();

</script>

</body>
</html>
