<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{font-family:Arial;margin:0;padding:10px}
table{width:100%;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #ddd}
th{background:#f4f4f4}
</style>
</head>
<body>

<table id="table">
<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Sp</th>
<th>Tore</th>
<th>Punkte</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch("table.json")
.then(r=>r.json())
.then(data=>{
  const tbody=document.querySelector("tbody");

  data.forEach(t=>{
    const row=`
<tr>
<td>${t.position}</td>
<td>${t.team}</td>
<td>${t.games}</td>
<td>${t.goals}</td>
<td>${t.points}</td>
</tr>`;
    tbody.innerHTML+=row;
  });
});
</script>

</body>
</html>
