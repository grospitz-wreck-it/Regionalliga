<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regionalliga West Tabelle</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>

<body>

<div class="table-wrapper">

  <table class="rl-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Team</th>
        <th>Sp</th>
        <th>S</th>
        <th>U</th>
        <th>N</th>
        <th>Tore</th>
        <th>Pkt</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <div class="legend">
    <span class="lg promoted"></span> Aufstieg
    <span class="lg relegated"></span> Abstieg
  </div>

  <div class="source">
    Quelle: fussball.de • Logos: Vereine
  </div>

</div>

<script>
function sendHeight() {
  const height = document.documentElement.scrollHeight
  parent.postMessage({ height: height }, "*")
}

// mehrfach senden (wichtig!)
window.addEventListener("load", sendHeight)
window.addEventListener("resize", sendHeight)

// 🔥 FIX: nochmal nach kurzer Zeit (Fonts / Images)
setTimeout(sendHeight, 200)
setTimeout(sendHeight, 500)
setTimeout(sendHeight, 1000)
</script>
</body>
</html>
