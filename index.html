<!DOCTYPE html>
<html lang="de">

  <link rel="stylesheet" href="style.css">

<body>

<div class="table-wrapper">

  <!-- 🔥 HEADER -->
  <div class="header">
    <h1 class="headline">Tabelle Regionalliga West</h1>
    <div id="meta" class="meta"></div>
  </div>

  <!-- 🔥 TABELLE -->
  <table class="rl-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Team</th>
        <th>Sp</th>
        <th>S</th>
        <th>U</th>
        <th>N</th>
        <th>Tore</th>
        <th>Pkt</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <!-- 🔥 LEGENDE -->
  <div class="legend">
    <span class="lg promoted"></span> Aufstieg
    <span class="lg relegated"></span> Abstieg
  </div>

  <!-- 🔥 QUELLE -->
  <div class="source">
    Quelle: fussball.de • Logos: Vereine
  </div>

</div>

<!-- 🔥 SCRIPT -->
<script src="script.js"></script>
