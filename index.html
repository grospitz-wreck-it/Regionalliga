<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.table-box{
max-width:950px;
margin:auto;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#020617;
padding:12px;
font-size:14px;
}

td{
padding:10px;
border-bottom:1px solid #334155;
text-align:center;
}

.team{
display:flex;
align-items:center;
gap:10px;
text-align:left;
}

.team img{
width:28px;
height:28px;
}

tr:nth-child(1){
background:#14532d;
}

tr:nth-child(16),
tr:nth-child(17),
tr:nth-child(18){
background:#7f1d1d;
}

tr:hover{
background:#334155;
}

</style>

</head>

<body>

<h1>Regionalliga West</h1>

<div class="table-box">

<table>

<thead>
<tr>
<th>#</th>
<th style="text-align:left">Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>Pkt</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

fetch("table.json")
.then(r=>r.json())
.then(data=>{

const tbody=document.getElementById("table");

data.forEach(team=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${team.position}</td>

<td class="team">
<img src="${team.logo}">
${team.team}
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td><b>${team.points}</b></td>

`;

tbody.appendChild(tr);

});

});

</script>

</body>
</html>
