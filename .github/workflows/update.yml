name: Update Regionalliga Table

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dependencies installieren
        run: npm install

      - name: Tabelle aktualisieren
        run: npm run update

      - name: Änderungen committen
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add table.json
          git commit -m "update table" || echo "no changes"
          git push
