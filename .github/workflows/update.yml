<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Regionalliga West Tabelle</title>

<style>

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#ffffff;
}

.wrapper{
  width:100%;
  max-width:720px;
  margin:auto;
  padding:10px;
  box-sizing:border-box;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

thead{
  background:#f5f5f5;
}

th,td{
  padding:8px 6px;
  text-align:center;
  border-bottom:1px solid #e6e6e6;
}

td.team{
  text-align:left;
  display:flex;
  align-items:center;
  gap:8px;
}

.team img{
  width:20px;
  height:20px;
  object-fit:contain;
}

th.team{
  text-align:left;
}

.source{
  font-size:10px;
  color:#888;
  text-align:right;
  margin-top:6px;
}

@media (max-width:600px){

table{
  font-size:13px;
}

.team img{
  width:18px;
  height:18px;
}

.source{
  font-size:9px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<table id="table">

<thead>
<tr>
<th>#</th>
<th class="team">Team</th>
<th>Sp</th>
<th>S</th>
<th>U</th>
<th>N</th>
<th>Tore</th>
<th>Pkt</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="source">
Spielergebnisse: fussball.de · Tabellenberechnung und Darstellung: eigene Auswertung
</div>

</div>

<script>

fetch("table.json")
.then(r=>r.json())
.then(data=>{

const tbody=document.querySelector("#table tbody");

data.forEach(team=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${team.position}</td>

<td class="team">
<img src="${team.logo}" loading="lazy">
${team.team}
</td>

<td>${team.games}</td>
<td>${team.wins}</td>
<td>${team.draws}</td>
<td>${team.losses}</td>
<td>${team.goals}</td>
<td>${team.points}</td>

`;

tbody.appendChild(tr);

});

});

</script>

</body>
</html>
