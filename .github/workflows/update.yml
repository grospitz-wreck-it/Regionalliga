name: Update Regionalliga Table

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  update:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node update.js

      - name: Commit updated table
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add table.json
          git commit -m "update table" || echo "no changes"
          git push
