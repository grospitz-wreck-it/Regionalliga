name: Update Regionalliga Table

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      - name: Tabelle aktualisieren
        run: npm run update

      - name: Prüfe ob table.json existiert
        run: |
          if [ ! -f table.json ]; then
            echo "ERROR: table.json wurde nicht erzeugt"
            exit 1
          fi

      - name: Änderungen committen
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add table.json

          if git diff --cached --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "update regionalliga table"
            git push
          fi
