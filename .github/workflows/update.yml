name: Update Regionalliga Table

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install axios cheerio

      - run: node update.js

      - name: Commit wenn geändert
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add table.json
          git diff --staged --quiet || git commit -m "update table"
          git push
